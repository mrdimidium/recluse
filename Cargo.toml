[package]
name = "zorian"
publish = false
edition = "2024"
version = "0.1.0"
license = "AGPL-3.0-or-later"
authors = ["Nikolay Govorov <me@govorov.online>"]
homepage = "https://pkg.earth"
repository = "https://github.com/mrdimidium/Zorian"

[dependencies]
axum = { version = "0.8.8", features = ["http2", "macros", "multipart"] }
bytes = "1.11.0"
chrono = "0.4"
crc32fast = "1.4.2"
hex = "0.4"
http-body-util = "0.1.3"
hyper = "1.8.1"
hyper-tls = "0.6.0"
hyper-util = { version = "0.1.19", features = ["client", "http1", "http2", "tokio"] }
minijinja = "2.14.0"
semver = "1.0"
serde = { version = "1.0", features = ["derive"] }
sqlx = { version = "0.8.6", features = ["sqlite", "runtime-tokio", "macros", "derive", "chrono", "json"] }
thiserror = "2.0"
tokio = { version = "1.49.0", features = ["full"] }
toml = "0.9.8"
tower-http = { version = "0.6.8", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
tower = "0.5.3"
uuid = { version = "1.19.0", features = ["v4","v5"] }

[dev-dependencies]
cargo-deny = "0.19.0"
