name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: nightly

jobs:
  lint:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2

      - name: Check licenses
        uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6.0.0

      - name: Check dependencies
        uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979 # 0.19.0

      - name: Check formatting
        run: cargo fmt --all --check

  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@e89d40939c28e39f97cf32126055eeae86ba74ec #v6.3.0
        with:
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}

      - run: cargo clippy --all-targets --all-features --release -- -D warnings
      - run: cargo build --release
      - run: cargo test --all-features --release --locked

      - name: Install nfpm
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt update && sudo apt install nfpm

      - name: Build packages
        run: |
          export SIGNING_PRIVATE_KEY="/tmp/private.asc"
          printf '%s' "$GPG_PRIVATE_KEY" > $SIGNING_PRIVATE_KEY
          chmod 600 $SIGNING_PRIVATE_KEY

          PKG_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "recluse") | .version')
          export VERSION="${PKG_VERSION}~nightly.$(git log -1 --format=%ct)"
          export ARCH=${{ matrix.arch }}

          mkdir -p dist/
          for pkg in deb rpm; do
            nfpm package --packager $pkg --target dist/
          done
        env:
          GPG_KEY_ID: ${{ vars.GPG_KEY_ID }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          NFPM_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Install tools
        run: make setup

      - name: Generate coverage (lcov)
        run: cargo llvm-cov --all-features --workspace --lcov --output-path coverage.lcov

      - name: Upload coverage artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: coverage-lcov-${{ matrix.arch }}
          path: coverage.lcov

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: packages-${{ matrix.arch }}
          path: dist/*

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: binary-${{ matrix.arch }}
          path: target/release/recluse

  smoke:
    name: Smoke tests
    runs-on: ubuntu-24.04
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: binary-amd64
          path: target/release/

      - name: Run smoke tests against local instance
        run: |
          chmod +x target/release/recluse
          ./tests/smoke/run-local.sh

  publish:
    name: Publish nightly build
    runs-on: ubuntu-latest
    needs: [build, smoke]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aptly rclone createrepo-c

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: packages-*
          path: dist
          merge-multiple: true

      # Configure GPG keys
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@e89d40939c28e39f97cf32126055eeae86ba74ec #v6.3.0
        with:
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
      - name: Export GPG public key
        run: printf '%s' "$GPG_PUBLIC_KEY" > dist/public.gpg
        env:
          GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}

      # Update Github Release
      - name: Update 'nightly' tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -f ${{ env.RELEASE_TAG }}
          git push origin --force tag ${{ env.RELEASE_TAG }}
      - name: Delete old release assets
        run: |
          for asset in $(gh release view ${{ env.RELEASE_TAG }} --json assets --jq '.assets[].name' 2>/dev/null || true); do
            gh release delete-asset ${{ env.RELEASE_TAG }} "$asset" --yes
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          name: ${{ env.RELEASE_TAG }}
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/*
          body: |
            Last successful build from `main` branch.

            **Release checks**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Update APT/RPM repos on s3
      - name: Create APT repository
        run: |
          aptly repo create -distribution="${{ env.RELEASE_TAG }}" -component=main recluse
          aptly repo add recluse dist/*.deb
          aptly publish repo -architectures=amd64,arm64 -gpg-key="${{vars.GPG_KEY_ID}}" recluse
      - name: Create RPM repository
        run: |
          mkdir -p rpm-repo
          cp dist/*.rpm rpm-repo/

          cat > rpm-repo/recluse-nightly.repo << EOF
          [recluse-nightly]
          name=Recluse Nightly
          gpgkey=${{github.server_url}}/${{github.repository}}/releases/download/${{env.RELEASE_TAG}}/public.gpg
          baseurl=https://${{vars.S3_BUCKET}}.${{vars.S3_ENDPOINT}}/rpm/
          enabled=1
          gpgcheck=1
          EOF

          createrepo_c rpm-repo/
          gpg --default-key="${{vars.GPG_KEY_ID}}" --detach-sign --armor rpm-repo/repodata/repomd.xml
      - name: Upload RPM to S3
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [hetzner]
          type = s3
          provider = Other
          acl = public-read
          endpoint = ${{vars.S3_ENDPOINT}}
          access_key_id = ${{secrets.S3_ACCESS_KEY_ID}}
          secret_access_key = ${{secrets.S3_SECRET_ACCESS_KEY}}
          EOF

          rclone sync rpm-repo/        "hetzner:${{vars.S3_BUCKET}}/rpm/" --progress
          rclone sync ~/.aptly/public/ "hetzner:${{vars.S3_BUCKET}}/apt/" --progress
